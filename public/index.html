<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patitas Felices - Veterinaria</title>
    <link rel="icon" type="image/png" href="icono.png">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">
        <img src="logo.png" alt="Logo Patitas Felices" class="login-logo">
        <h1>Patitas Felices</h1>
        <p>Sistema de gestion veterinaria</p>

        <div id="auth-section">
            <div class="tabs">
                <button class="tab active" onclick="mostrarTab('login')">Iniciar Sesion</button>
                <button class="tab" onclick="mostrarTab('register')">Registrarse</button>
            </div>

            <form id="login-form" class="form" onsubmit="handleLogin(event)">
                <h2>Iniciar Sesion</h2>
                <div class="form-group">
                    <label for="login-email">Email</label>
                    <input type="email" id="login-email" required>
                </div>
                <div class="form-group">
                    <label for="login-password">Contraseña</label>
                    <div class="password-wrapper">
                        <input type="password" id="login-password" required>
                        <button type="button" class="password-toggle" onclick="togglePassword('login-password', this)">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                                <circle cx="12" cy="12" r="3" />
                            </svg>
                        </button>
                    </div>
                </div>
                <button type="submit" class="btn">Ingresar</button>
            </form>

            <form id="register-form" class="form hidden" onsubmit="handleRegister(event)">
                <h2>Registrarse</h2>
                <div class="form-group">
                    <label for="reg-username">Usuario</label>
                    <input type="text" id="reg-username" required minlength="3">
                </div>
                <div class="form-group">
                    <label for="reg-email">Email</label>
                    <input type="email" id="reg-email" required>
                </div>
                <div class="form-group">
                    <label for="reg-password">Contraseña</label>
                    <div class="password-wrapper">
                        <input type="password" id="reg-password" required minlength="6">
                        <button type="button" class="password-toggle" onclick="togglePassword('reg-password', this)">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                                <circle cx="12" cy="12" r="3" />
                            </svg>
                        </button>
                    </div>
                </div>
                <div class="form-group">
                    <label for="reg-password-confirm">Confirmar Contraseña</label>
                    <div class="password-wrapper">
                        <input type="password" id="reg-password-confirm" required minlength="6">
                        <button type="button" class="password-toggle"
                            onclick="togglePassword('reg-password-confirm', this)">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                                <circle cx="12" cy="12" r="3" />
                            </svg>
                        </button>
                    </div>
                </div>
                <button type="submit" class="btn">Registrarse</button>
            </form>

            <div id="mensaje" class="mensaje"></div>
        </div>
    </div>

    <!-- Overlay de carga -->
    <div id="loading-overlay" class="loading-overlay hidden">
        <div class="loading-content">
            <div class="loading-spinner"></div>
            <p class="loading-text">Cargando...</p>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
